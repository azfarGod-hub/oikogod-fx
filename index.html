<!DOCTYPE html>
<html>
<head>
  <title>OIKOGOD FX</title>

  <!-- SUPABASE CDN (NO IMPORT ERROR) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>OIKOGOD FX</h1>

<input id="title" placeholder="Judul"><br><br>
<textarea id="content" placeholder="Analisa"></textarea><br><br>

<button onclick="post()">Upload</button>

<hr>

<div id="posts"></div>

<script>
const supabaseUrl = "https://fsoiasxkkjqdajygqwmx.supabase.co";
const supabaseKey = "PASTE_ANON_KEY_LU";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function load() {
  const { data } = await supabase.from('posts').select();

  document.getElementById('posts').innerHTML =
    (data || []).reverse().map(p => `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>${p.title}</h3>
        <p>${p.content}</p>
      </div>
    `).join('');
}

window.post = async function () {
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  await supabase.from('posts').insert([
    { title, content }
  ]);

  load();
}

load();
</script>

</body>
</html>
